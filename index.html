<body>
<div id="loginGate" class="loading-overlay" style="flex-direction:column;gap:16px">
  <div style="font-family:'Cormorant Garamond',serif;font-size:24px;color:var(--gold)">Sitzordnung</div>
  <div style="font-family:'DM Mono',monospace;font-size:10px;color:var(--text-dim);letter-spacing:3px;text-transform:uppercase">Zweite Violinen</div>
  <div style="margin-top:16px;display:flex;gap:8px">
    <input type="password" id="gatePassword" placeholder="Passwort" style="font-family:'DM Sans',sans-serif;font-size:14px;padding:10px 14px;border:1px solid var(--border);border-radius:var(--radius);background:var(--surface);color:var(--text);outline:none;width:200px;text-align:center" onkeydown="if(event.key==='Enter')checkGate()">
    <button onclick="checkGate()" style="font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;padding:10px 18px;border:none;border-radius:var(--radius);cursor:pointer;background:var(--gold);color:var(--bg)">→</button>
  </div>
  <div id="gateError" style="font-size:12px;color:var(--danger);display:none">Falsches Passwort</div>
</div>

<div id="mainApp" style="display:none">
<div id="loading" class="loading-overlay">
  <div class="spinner"></div>
  <span style="font-family:'DM Mono',monospace;font-size:12px;color:var(--text-dim)">Daten werden geladen...</span>
</div>

<div class="header">
  <h1>Sitzordnung</h1>
  <div class="subtitle">Zweite Violinen</div>
  <div class="sync-status" id="syncStatus">● Verbunden</div>
  <button id="adminLock" onclick="toggleAdmin()" style="position:absolute;top:12px;right:12px;background:none;border:none;font-size:16px;cursor:pointer;opacity:0.3;padding:4px">🔒</button>
</div>
<div class="nav">
  <button class="active" data-view="generate" onclick="switchView('generate')">Erstellen</button>
  <button data-view="members" onclick="switchView('members')">Besetzung</button>
  <button data-view="rules" onclick="switchView('rules')">Regeln</button>
  <button data-view="history" onclick="switchView('history')">Verlauf</button>
  <button data-view="stats" onclick="switchView('stats')">Statistik</button>
</div>
<div class="main" id="app"></div>
</div><!-- end mainApp -->

<!-- Gate check (runs before Firebase module) -->
<script>
const GATE_HASH = '322e56696f6c696e656e'; // "2.Violinen"
function gateHash(pw) { return Array.from(pw).map(c => c.charCodeAt(0).toString(16).padStart(2,'0')).join(''); }

function checkGate() {
  const pw = document.getElementById('gatePassword').value;
  if (gateHash(pw) === GATE_HASH) {
    localStorage.setItem('sitzordnung-gate', GATE_HASH);
    showApp();
  } else {
    document.getElementById('gateError').style.display = 'block';
    document.getElementById('gatePassword').value = '';
  }
}

function showApp() {
  document.getElementById('loginGate').style.display = 'none';
  document.getElementById('mainApp').style.display = 'block';
}

// Check if already authenticated
if (localStorage.getItem('sitzordnung-gate') === GATE_HASH) {
  showApp();
}
</script>

<!-- Firebase -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyC-OHW76NL291iSbwPgoyXuHtSRIuBfSDY",
  authDomain: "sitzordnung-f7b92.firebaseapp.com",
  projectId: "sitzordnung-f7b92",
  storageBucket: "sitzordnung-f7b92.firebasestorage.app",
  messagingSenderId: "1015573499355",
  appId: "1:1015573499355:web:840966a1ea4e2ebc5debfe",
  measurementId: "G-1G57JPS8RH"
};

const fbApp = initializeApp(firebaseConfig);
const db = getFirestore(fbApp);
const DOC_REF = doc(db, 'sitzordnung', 'main');

// ═══════════════════════════════════════
// ROLE CONFIGURATION
// ═══════════════════════════════════════
const ROLE_PRIORITY = { stimmfuehrer: 1, stellvertreter: 2, vorspieler: 3, tutti: 4, akademist: 4, substitut: 4 };
const ROLE_LABELS = { stimmfuehrer: 'Stimmf.', stellvertreter: 'Stellv.', vorspieler: 'Vorsp.', tutti: 'Tutti', akademist: 'Akad.', substitut: 'Subst.' };
const ROLE_LABELS_FULL = { stimmfuehrer: 'Stimmführer/in', stellvertreter: 'Stellv. Stimmf.', vorspieler: 'Vorspieler/in', tutti: 'Tutti', akademist: 'Akademist/in', substitut: 'Substitut' };
const ROLE_CSS = { stimmfuehrer: 'r-sf', stellvertreter: 'r-sv', vorspieler: 'r-vs', tutti: '', akademist: 'r-ak', substitut: 'r-su' };
const RANKED_ROLES = ['stimmfuehrer', 'stellvertreter', 'vorspieler'];

// ═══════════════════════════════════════
// STATE
// ═══════════════════════════════════════
let state = { members: [], history: [], nextId: 1, incompatible: [] };
// incompatible: array of [memberId1, memberId2] pairs that can never share a Pult
let currentView = 'generate';
let selected = new Set();
let currentSeating = null;
let weekLabel = '';
let weekNotes = '';
let expandedWeeks = new Set();
let editingId = null;
let editingWeekId = null;
let fixedPairs = []; // [{a: id, b: id, pult: number|0}] — manual pairs for current generation
let saving = false;
let loaded = false;

// ═══════════════════════════════════════
// ADMIN MODE
// ═══════════════════════════════════════
const ADMIN_HASH = '2f312f322e566c2e445068696c213f'; // hashed password
function hashPw(pw) { return Array.from(pw).map(c => c.charCodeAt(0).toString(16).padStart(2,'0')).join(''); }
let isAdmin = localStorage.getItem('sitzordnung-admin') === ADMIN_HASH;

function updateNav() {
  document.querySelectorAll('.nav button').forEach(b => {
    if (b.dataset.view === 'rules') b.style.display = isAdmin ? '' : 'none';
    if (b.dataset.view === 'generate') b.textContent = isAdmin ? 'Erstellen' : 'Aktuell';
  });
  const lockBtn = document.getElementById('adminLock');
  if (lockBtn) lockBtn.textContent = isAdmin ? '🔓' : '🔒';
}

window.toggleAdmin = function() {
  if (isAdmin) {
    isAdmin = false;
    localStorage.removeItem('sitzordnung-admin');
    if (currentView === 'rules') switchView('generate');
    updateNav(); render();
  } else {
    const pw = prompt('Admin-Passwort:');
    if (pw && hashPw(pw) === ADMIN_HASH) {
      isAdmin = true;
      localStorage.setItem('sitzordnung-admin', ADMIN_HASH);
      updateNav(); render();
    } else if (pw) {
      alert('Falsches Passwort');
    }
  }
};

// ═══════════════════════════════════════
// FIREBASE SYNC
// ═══════════════════════════════════════
async function saveState() {
  const statusEl = document.getElementById('syncStatus');
  statusEl.textContent = '● Wird gespeichert...';
  statusEl.className = 'sync-status syncing';
  saving = true;
  try {
    await setDoc(DOC_REF, { data: JSON.stringify(state) });
    statusEl.textContent = '● Synchronisiert';
    statusEl.className = 'sync-status';
  } catch(e) {
    console.error('Save error:', e);
    statusEl.textContent = '● Speichern fehlgeschlagen';
    statusEl.className = 'sync-status offline';
    // Fallback to localStorage
    try { localStorage.setItem('sitzordnung-data', JSON.stringify(state)); } catch(e2) {}
  }
  saving = false;
}

// Real-time listener: updates from any device appear instantly
onSnapshot(DOC_REF, (snapshot) => {
  if (saving) return; // ignore our own writes
  if (snapshot.exists()) {
    try {
      const parsed = JSON.parse(snapshot.data().data);
      // Migrate old format
      if (parsed.members) parsed.members.forEach(m => {
        if (!m.role) { m.role = m.isLeader ? 'stimmfuehrer' : 'tutti'; delete m.isLeader; }
        if (m.pultMin === undefined) m.pultMin = 0;
        if (m.pultMax === undefined) m.pultMax = 0;
        if (!m.wunsch) m.wunsch = []; // preferred partner IDs (max 3)
      });
      if (!parsed.incompatible) parsed.incompatible = [];
      state = { members: [], history: [], nextId: 1, incompatible: [], ...parsed };
      if (loaded) render();
    } catch(e) { console.error('Parse error:', e); }
  }
  if (!loaded) {
    loaded = true;
    document.getElementById('loading').style.display = 'none';
    updateNav();
    render();
  }
  const statusEl = document.getElementById('syncStatus');
  statusEl.textContent = '● Verbunden';
  statusEl.className = 'sync-status';
}, (error) => {
  console.error('Firestore listener error:', error);
  const statusEl = document.getElementById('syncStatus');
  statusEl.textContent = '● Offline — lokale Daten';
  statusEl.className = 'sync-status offline';
  // Fallback: load from localStorage
  try {
    const r = localStorage.getItem('sitzordnung-data');
    if (r) state = { ...state, ...JSON.parse(r) };
  } catch(e) {}
  if (!loaded) {
    loaded = true;
    document.getElementById('loading').style.display = 'none';
    updateNav();
    render();
  }
});

// ═══════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [a[i], a[j]] = [a[j], a[i]]; }
  return a;
}
function pairKey(a, b) { return [a, b].sort((x, y) => x - y).join('-'); }

function isSpecialRole(m) { return SPECIAL_ROLES.includes(m.role); }
function rolePriority(m) { return ROLE_PRIORITY[m.role] || 4; }
function isRanked(m) { return RANKED_ROLES.includes(m.role); }
function serialize(m) { return { id: m.id, code: m.code, name: m.name, role: m.role, pultMin: m.pultMin || 0, pultMax: m.pultMax || 0 }; }

function areIncompatible(idA, idB) {
  return (state.incompatible || []).some(pair =>
    (pair[0] === idA && pair[1] === idB) || (pair[0] === idB && pair[1] === idA)
  );
}

function wunschBonus(idA, idB) {
  const a = state.members.find(m => m.id === idA);
  const b = state.members.find(m => m.id === idB);
  const aWantsB = a && a.wunsch && a.wunsch.includes(idB);
  const bWantsA = b && b.wunsch && b.wunsch.includes(idA);
  if (aWantsB && bWantsA) return 2; // mutual
  if (aWantsB || bWantsA) return 1; // one-way
  return 0; // none
}

const SPECIAL_ROLES = ['akademist', 'substitut'];
const SPECIAL_PENALTY_MULT = 5;

// ═══════════════════════════════════════
// ALGORITHM CONSTANTS (calibrated with real season data)
// ═══════════════════════════════════════
const COVERAGE_PRIORITY = 120;   // Coverage urgency cap (120 = good balance: ~5% 0×, uniform across season)
const WUNSCH_BONUS_MUTUAL = 80;  // Phase 2: bonus for mutual wunschpartner
const WUNSCH_BONUS_ONEWAY = 40;  // Phase 2: bonus for one-way wunschpartner
const WUNSCH_ROTATION = 50;      // Phase 2: extra bonus for least-played wunschpartner
const NW_CAP_AT1 = 200;          // Phase 2: penalty for non-wunsch already at 1×
const NW_CAP_AT2 = 2000;         // Phase 2: huge penalty for non-wunsch already at 2×
const BACKTOBACK_PENALTY = 50;   // Penalty for same partner in last 2 weeks

// ═══════════════════════════════════════
// FULL SEASON PAIR COUNTS
// ═══════════════════════════════════════
function getSeasonPairCounts() {
  const counts = {};
  state.history.forEach(w => w.atriles.forEach(a => {
    if (a.length >= 2) {
      for (let i = 0; i < a.length; i++)
        for (let j = i+1; j < a.length; j++) {
          const k = pairKey(a[i].id, a[j].id);
          counts[k] = (counts[k] || 0) + 1;
        }
    }
  }));
  return counts;
}

function getRecentPairCounts(lookback = 2) {
  const counts = {};
  state.history.slice(-lookback).forEach(w => w.atriles.forEach(a => {
    if (a.length >= 2) {
      for (let i = 0; i < a.length; i++)
        for (let j = i+1; j < a.length; j++) {
          const k = pairKey(a[i].id, a[j].id);
          counts[k] = (counts[k] || 0) + 1;
        }
    }
  }));
  return counts;
}

// ═══════════════════════════════════════
// CORE SEATING ALGORITHM (Blended v3)
// ═══════════════════════════════════════
// Full season lookback. Coverage and Wunsch compete naturally.
// v3: Vorspieler integrated into Wunschpartner system,
//     fixed pairs don't overwrite, position rotation, violation warnings

function getAvgPultPositions() {
  // Calculate average pult position for each person across season history
  const totals = {}; // id → { sum, count }
  state.history.forEach(w => {
    w.atriles.forEach((a, pi) => {
      a.forEach(p => {
        if (!totals[p.id]) totals[p.id] = { sum: 0, count: 0 };
        totals[p.id].sum += (pi + 1);
        totals[p.id].count += 1;
      });
    });
  });
  const avgs = {};
  for (const id in totals) {
    avgs[id] = totals[id].count > 0 ? totals[id].sum / totals[id].count : 0;
  }
  return avgs;
}

function canSharePult(mA, mB, totalPulte) {
  // Check if two people have overlapping valid pult ranges
  const minA = mA.pultMin || 1;
  const maxA = mA.pultMax || totalPulte;
  const minB = mB.pultMin || 1;
  const maxB = mB.pultMax || totalPulte;
  const overlapMin = Math.max(minA, minB);
  const overlapMax = Math.min(maxA, maxB, totalPulte);
  return overlapMin <= overlapMax;
}

function generateSeating(ids) {
  const all = ids.map(id => state.members.find(m => m.id === id)).filter(Boolean);
  const ranked = all.filter(m => isRanked(m)).sort((a, b) => rolePriority(a) - rolePriority(b) || a.code - b.code);
  const tuttis = all.filter(m => m.role === 'tutti');
  const akademists = all.filter(m => m.role === 'akademist');
  const substituts = all.filter(m => m.role === 'substitut');
  const seasonCounts = getSeasonPairCounts();
  const recentCounts = getRecentPairCounts(2);
  const avgPositions = getAvgPultPositions();

  const totalPeople = all.length;
  const totalPulte = Math.ceil(totalPeople / 2);
  const backHalfStart = Math.ceil(totalPulte / 2);
  const rankedPulte = Math.ceil(ranked.length / 2);
  const allTuttiIds = all.filter(m => m.role === 'tutti').map(m => m.id);

  // ── Step 0: Handle fixedPairs — reserve slots first ──
  const fixedIds = new Set();
  const resolvedFixed = [];
  for (const fp of fixedPairs) {
    const ma = all.find(m => m.id === fp.a);
    const mb = all.find(m => m.id === fp.b);
    if (ma && mb) {
      fixedIds.add(fp.a); fixedIds.add(fp.b);
      resolvedFixed.push({ pair: [serialize(ma), serialize(mb)], pult: fp.pult || 0 });
    }
  }

  const rankedFiltered = ranked.filter(m => !fixedIds.has(m.id));
  const freePoolBase = [...tuttis, ...akademists].filter(m => !fixedIds.has(m.id));
  const subsFiltered = substituts.filter(m => !fixedIds.has(m.id));

  // ── Step 1: Pre-allocate pulte array with reserved slots ──
  const pulte = new Array(totalPulte).fill(null).map(() => []);

  // Place fixed pairs first — find first empty slot if no specific pult
  for (const fp of resolvedFixed) {
    if (fp.pult > 0) {
      const idx = Math.min(Math.max(fp.pult - 1, 0), totalPulte - 1);
      pulte[idx] = fp.pair;
    } else {
      let placed = false;
      for (let i = rankedPulte; i < totalPulte; i++) {
        if (pulte[i].length === 0) { pulte[i] = fp.pair; placed = true; break; }
      }
      if (!placed) {
        for (let i = 0; i < totalPulte; i++) {
          if (pulte[i].length === 0) { pulte[i] = fp.pair; break; }
        }
      }
    }
  }

  // Place ranked in front (skip slots already taken by fixed pairs)
  const rankedSer = rankedFiltered.map(m => serialize(m));
  let ri = 0;
  for (let pi = 0; pi < totalPulte && ri < rankedSer.length; pi++) {
    if (pulte[pi].length > 0) continue;
    pulte[pi].push(rankedSer[ri]);
    ri++;
    if (ri < rankedSer.length && pulte[pi].length < 2) {
      pulte[pi].push(rankedSer[ri]);
      ri++;
    }
  }

  // ── Step 1b: Vorspieler partner matching ──
  // Ranked members sitting alone (typically Vorspieler/Stellvertreter) get the best
  // Tutti partner from the free pool, using the full scoring system.
  // This integrates Vorspieler into the Wunschpartner system.
  const usedForRanked = new Set();
  for (let pi = 0; pi < totalPulte; pi++) {
    if (pulte[pi].length !== 1) continue;
    const solo = pulte[pi][0];
    if (!isRanked(solo)) continue;

    // Find best Tutti partner for this ranked member
    let bestCand = null, bestScore = Infinity;
    for (const m of freePoolBase) {
      if (fixedIds.has(m.id) || usedForRanked.has(m.id)) continue;
      if (areIncompatible(solo.id, m.id)) continue;
      // Check pult compatibility
      const pultNum = pi + 1;
      const mMin = m.pultMin || 0;
      const mMax = m.pultMax || 0;
      if ((mMin > 0 && pultNum < mMin) || (mMax > 0 && pultNum > mMax)) continue;

      const pk_ = pairKey(solo.id, m.id);
      const seasonCount = seasonCounts[pk_] || 0;
      let s = (recentCounts[pk_] || 0) * BACKTOBACK_PENALTY + Math.random() * 5;
      s += seasonCount * 30;

      // Wunsch bonus works for ranked↔tutti too
      const wb = wunschBonus(solo.id, m.id);
      if (wb > 0) {
        let bonus = (wb === 2) ? WUNSCH_BONUS_MUTUAL : WUNSCH_BONUS_ONEWAY;
        s -= bonus;
      }

      if (s < bestScore) { bestScore = s; bestCand = m; }
    }
    if (bestCand) {
      pulte[pi].push(serialize(bestCand));
      usedForRanked.add(bestCand.id);
    }
  }

  // Remove Tutti used for ranked partners from free pool
  const freePoolFiltered = freePoolBase.filter(m => !fixedIds.has(m.id) && !usedForRanked.has(m.id));

  // ── Step 2: Smart-pair remaining tutti + akademist (blended scoring) ──
  const freePool = shuffle(freePoolFiltered);
  const paired = new Set();
  const freePairs = [];

  for (let i = 0; i < freePool.length; i++) {
    if (paired.has(freePool[i].id)) continue;
    let bestJ = -1, bestScore = Infinity;

    const pId = freePool[i].id;
    const pIsTutti = freePool[i].role === 'tutti';
    const pIsSpecial = isSpecialRole(freePool[i]);

    const uncovered = new Set();
    if (pIsTutti) {
      for (const tid of allTuttiIds) {
        if (tid === pId) continue;
        if ((seasonCounts[pairKey(pId, tid)] || 0) === 0) uncovered.add(tid);
      }
    }

    const pMember = state.members.find(m => m.id === pId);
    const pWunsch = (pMember && pMember.wunsch) || [];
    let minWunschCount = 999;
    for (const wId of pWunsch) {
      minWunschCount = Math.min(minWunschCount, seasonCounts[pairKey(pId, wId)] || 0);
    }

    for (let j = i + 1; j < freePool.length; j++) {
      if (paired.has(freePool[j].id)) continue;
      if (areIncompatible(pId, freePool[j].id)) continue;

      // FIX 1: Check pultMin/pultMax compatibility before scoring
      if (!canSharePult(freePool[i], freePool[j], totalPulte)) continue;

      const cId = freePool[j].id;
      const cIsTutti = freePool[j].role === 'tutti';
      const cIsSpecial = isSpecialRole(freePool[j]);
      const eitherSpecial = pIsSpecial || cIsSpecial;
      const pk_ = pairKey(pId, cId);
      const seasonCount = seasonCounts[pk_] || 0;

      let s = (recentCounts[pk_] || 0) * BACKTOBACK_PENALTY + Math.random() * 5;

      if (eitherSpecial) {
        s += seasonCount * 100 * SPECIAL_PENALTY_MULT;
      } else if (pIsTutti && cIsTutti) {
        if (uncovered.has(cId)) {
          const urgency = Math.min(uncovered.size * 60, COVERAGE_PRIORITY);
          s -= urgency;
        }
        const wb = wunschBonus(pId, cId);
        if (wb > 0) {
          let bonus = (wb === 2) ? WUNSCH_BONUS_MUTUAL : WUNSCH_BONUS_ONEWAY;
          if (seasonCount === minWunschCount) bonus += WUNSCH_ROTATION;
          s -= bonus;
        } else {
          if (seasonCount >= 2) s += NW_CAP_AT2;
          else if (seasonCount >= 1) s += NW_CAP_AT1;
        }
        s += seasonCount * 30;
      }

      if (s < bestScore) { bestScore = s; bestJ = j; }
    }
    if (bestJ >= 0) {
      paired.add(freePool[i].id); paired.add(freePool[bestJ].id);
      freePairs.push([freePool[i], freePool[bestJ]]);
    } else {
      freePairs.push([freePool[i]]); // unpaired (odd number)
    }
  }

  // ── Step 3: Position rotation — sort pairs by who has been sitting further back ──
  // People with higher average pult position (further back) go to lower pult numbers (closer to front)
  freePairs.sort((a, b) => {
    const avgA = a.reduce((sum, m) => sum + (avgPositions[m.id] || totalPulte / 2), 0) / a.length;
    const avgB = b.reduce((sum, m) => sum + (avgPositions[m.id] || totalPulte / 2), 0) / b.length;
    return avgB - avgA; // higher avg (further back) goes first → gets front pult
  });

  // ── Step 4: Place free pairs into available slots (respecting pultMin/pultMax) ──
  for (const pair of freePairs) {
    // Find best available empty slot for this pair
    let bestSlot = -1, bestSlotScore = Infinity;
    for (let pi = 0; pi < totalPulte; pi++) {
      if (pulte[pi].length > 0) continue; // slot taken
      const pultNum = pi + 1;
      // Check pultMin/pultMax for all members of this pair
      let valid = true;
      for (const m of pair) {
        const min = m.pultMin || 0;
        const max = m.pultMax || 0;
        if ((min > 0 && pultNum < min) || (max > 0 && pultNum > max)) { valid = false; break; }
      }
      if (!valid) continue;
      // Score: prefer slot closest to what position rotation suggests
      // (first pairs in sorted order get first empty slots naturally)
      const score = pi; // lower = better (front)
      if (score < bestSlotScore) { bestSlotScore = score; bestSlot = pi; }
    }
    if (bestSlot >= 0) {
      pulte[bestSlot] = pair.map(m => serialize(m));
    } else {
      // Fallback: put in any empty slot (ignore constraints, will be fixed by swaps)
      for (let pi = 0; pi < totalPulte; pi++) {
        if (pulte[pi].length === 0) { pulte[bestSlot = pi] = pair.map(m => serialize(m)); break; }
      }
    }
  }

  // ── Step 5: Place Substituts — back half, NOT last pult, best rotation, never with Akademist ──
  const lastPultIdx = pulte.length - 1;
  const shuffledSubs = shuffle(subsFiltered);
  for (const sub of shuffledSubs) {
    const subSer = serialize(sub);
    let bestP = -1, bestScore = Infinity;
    for (let p = Math.max(backHalfStart, 0); p < pulte.length; p++) {
      if (p === lastPultIdx) continue; // never last pult
      if (pulte[p].length === 1 &&
          pulte[p][0].role !== 'akademist' &&
          !areIncompatible(sub.id, pulte[p][0].id)) {
        const score = (seasonCounts[pairKey(sub.id, pulte[p][0].id)] || 0) * 100 * SPECIAL_PENALTY_MULT + Math.random() * 2;
        if (score < bestScore) { bestScore = score; bestP = p; }
      }
    }
    // Fallback: try any slot with length 1 (except last pult)
    if (bestP < 0) {
      for (let p = 0; p < pulte.length; p++) {
        if (p === lastPultIdx) continue;
        if (pulte[p].length === 1 &&
            pulte[p][0].role !== 'akademist' &&
            !areIncompatible(sub.id, pulte[p][0].id)) {
          bestP = p; break;
        }
      }
    }
    if (bestP >= 0) { pulte[bestP].push(subSer); }
    // If truly no slot found, place in back half anyway (but never create extra Pult)
    else {
      for (let p = Math.max(backHalfStart, 0); p < pulte.length; p++) {
        if (p === lastPultIdx) continue;
        if (pulte[p].length < 2) { pulte[p].push(subSer); break; }
      }
    }
  }

  // Merge solo subs
  for (let p = pulte.length - 1; p >= backHalfStart; p--) {
    if (pulte[p].length === 1 && pulte[p][0].role === 'substitut') {
      for (let q = p + 1; q < pulte.length; q++) {
        if (pulte[q].length === 1 && pulte[q][0].role === 'substitut' &&
            !areIncompatible(pulte[p][0].id, pulte[q][0].id)) {
          pulte[p].push(pulte[q][0]);
          pulte.splice(q, 1);
          break;
        }
      }
    }
  }

  // ── Step 5b: Ensure Akademist is NOT in last pult ──
  for (let pi = 0; pi < pulte.length; pi++) {
    if (pi !== pulte.length - 1) continue;
    for (let mi = 0; mi < pulte[pi].length; mi++) {
      if (pulte[pi][mi].role === 'akademist') {
        // Swap with someone from a non-last pult
        let swapped = false;
        for (let ti = 0; ti < pulte.length - 1 && !swapped; ti++) {
          for (let tmi = 0; tmi < pulte[ti].length; tmi++) {
            const cand = pulte[ti][tmi];
            if (isRanked(cand)) continue;
            if (cand.role === 'substitut' || cand.role === 'akademist') continue;
            if (areIncompatible(pulte[pi][mi].id, pulte[ti].filter(p => p.id !== cand.id).map(p => p.id)[0])) continue;
            // Swap
            const akad = pulte[pi][mi];
            pulte[pi][mi] = cand;
            pulte[ti][tmi] = akad;
            swapped = true;
            break;
          }
        }
      }
    }
  }

  // ── Step 6: Fix remaining violations by swapping ──
  const MAX_SWAPS = 80;
  for (let attempt = 0; attempt < MAX_SWAPS; attempt++) {
    let violation = null;
    for (let pi = 0; pi < pulte.length; pi++) {
      for (const person of pulte[pi]) {
        const pultNum = pi + 1;
        const min = person.pultMin || 0;
        const max = person.pultMax || 0;
        if ((min > 0 && pultNum < min) || (max > 0 && pultNum > max)) {
          violation = { type: 'pult', pi, person, min, max };
          break;
        }
      }
      if (violation) break;
      if (pulte[pi].length >= 2) {
        for (let a = 0; a < pulte[pi].length; a++) {
          for (let b = a + 1; b < pulte[pi].length; b++) {
            if (areIncompatible(pulte[pi][a].id, pulte[pi][b].id)) {
              violation = { type: 'incompat', pi, person: pulte[pi][b] };
              break;
            }
          }
          if (violation) break;
        }
      }
      if (violation) break;
    }
    if (!violation) break;

    const { pi: badPi, person: badPerson } = violation;
    let targetMin = 0, targetMax = pulte.length - 1;
    if (violation.type === 'pult') {
      targetMin = (violation.min > 0 ? violation.min - 1 : 0);
      targetMax = (violation.max > 0 ? violation.max - 1 : pulte.length - 1);
    }
    let swapped = false;
    for (let ti = (violation.type === 'pult' ? targetMin : 0); ti <= (violation.type === 'pult' ? targetMax : pulte.length - 1) && !swapped; ti++) {
      if (ti === badPi) continue;
      for (let mi = 0; mi < pulte[ti].length; mi++) {
        const cand = pulte[ti][mi];
        if (isRanked(cand)) continue;
        const candMin = cand.pultMin || 0;
        const candMax = cand.pultMax || 0;
        const badNum = badPi + 1;
        if ((candMin > 0 && badNum < candMin) || (candMax > 0 && badNum > candMax)) continue;
        const badOthers = pulte[badPi].filter(p => p.id !== badPerson.id);
        if (badOthers.some(p => areIncompatible(cand.id, p.id))) continue;
        const tiOthers = pulte[ti].filter(p => p.id !== cand.id);
        if (tiOthers.some(p => areIncompatible(badPerson.id, p.id))) continue;
        if (cand.role === 'substitut' && badOthers.some(p => p.role === 'akademist')) continue;
        if (cand.role === 'akademist' && badOthers.some(p => p.role === 'substitut')) continue;
        if (badPerson.role === 'substitut' && tiOthers.some(p => p.role === 'akademist')) continue;
        if (badPerson.role === 'akademist' && tiOthers.some(p => p.role === 'substitut')) continue;
        const badIdx = pulte[badPi].findIndex(p => p.id === badPerson.id);
        pulte[badPi][badIdx] = cand;
        pulte[ti][mi] = badPerson;
        swapped = true;
        break;
      }
    }
    if (!swapped) break;
  }

  // FIX 3: Check for remaining violations and warn
  const warnings = [];
  for (let pi = 0; pi < pulte.length; pi++) {
    for (const person of pulte[pi]) {
      const pultNum = pi + 1;
      const min = person.pultMin || 0;
      const max = person.pultMax || 0;
      if ((min > 0 && pultNum < min) || (max > 0 && pultNum > max)) {
        warnings.push(`${person.name}: Pult ${pultNum} (erlaubt: ${min||1}–${max||'∞'})`);
      }
    }
    if (pulte[pi].length >= 2) {
      for (let a = 0; a < pulte[pi].length; a++) {
        for (let b = a + 1; b < pulte[pi].length; b++) {
          if (areIncompatible(pulte[pi][a].id, pulte[pi][b].id)) {
            warnings.push(`${pulte[pi][a].name} + ${pulte[pi][b].name}: Unverträglichkeit am Pult ${pi+1}`);
          }
        }
      }
    }
  }
  if (warnings.length > 0) {
    alert('⚠ Einige Einschränkungen konnten nicht erfüllt werden:\n\n' + warnings.join('\n'));
  }

  // Remove empty slots (can happen if odd number)
  return pulte.filter(p => p.length > 0);
}

// RENDERING
// ═══════════════════════════════════════
const app = document.getElementById('app');

function switchView(v) {
  currentView = v; currentSeating = null;
  document.querySelectorAll('.nav button').forEach(b => b.classList.toggle('active', b.dataset.view === v));
  render();
}
// Expose to global scope for onclick handlers
window.switchView = switchView;

function render() {
  if (!loaded) return;
  ({generate: renderGenerate, members: renderMembers, rules: renderRules, history: renderHistory, stats: renderStats})[currentView]();
}

function roleIcon(role) {
  if (role === 'tutti') return '';
  const css = ROLE_CSS[role] || '';
  return ` <span class="p-role ${css}">${ROLE_LABELS[role]}</span>`;
}

function hasFrontRole(atril) { return atril.some(p => RANKED_ROLES.includes(p.role)); }

function renderAtriles(atriles, printTitle) {
  let h = '';
  if (printTitle) h += `<div class="print-title">${weekLabel || 'Sitzordnung'} — ${new Date().toLocaleDateString('de-DE')}</div>`;
  h += `<div class="atriles-container">`;
  atriles.forEach((a, i) => {
    const front = hasFrontRole(a);
    h += `<div class="atril-card${front ? ' front' : ''}" style="animation-delay:${i * 0.05}s">
      <div class="atril-number">${i + 1}</div><div class="atril-players">`;
    a.forEach(p => {
      const role = p.role || 'tutti';
      h += `<div class="atril-player"><span class="p-code">${p.code}</span>${p.name}${roleIcon(role)}</div>`;
    });
    h += `</div><div class="atril-label">Pult</div></div>`;
  });
  return h + '</div>';
}

// ─── Generate View ───
function renderGenerate() {
  if (!isAdmin) {
    // Non-admin: show latest week from history
    if (!state.history.length) {
      app.innerHTML = `<div class="empty-state"><div class="icon">🎻</div><p>Noch keine Sitzordnung erstellt</p></div>`;
      return;
    }
    const latest = state.history[state.history.length - 1];
    let h = `<div class="section-title">Aktuelle Sitzordnung</div>`;
    h += `<div style="font-size:14px;color:var(--text-mid);margin-bottom:12px">${latest.label} — ${new Date(latest.date).toLocaleDateString('de-DE')}</div>`;
    h += `<div id="weekExport_latest">`;
    h += renderAtriles(latest.atriles, false);
    if (latest.notes) h += `<div style="margin-top:8px;padding:8px 12px;background:var(--surface2);border-radius:var(--radius);font-size:12px;color:var(--text-mid);white-space:pre-wrap">📝 ${latest.notes}</div>`;
    h += `</div>`;
    h += `<div class="mt12"><button class="btn btn-outline btn-small" onclick="exportWeekImage(${latest.id})">📷 Als Bild teilen</button></div>`;
    app.innerHTML = h;
    return;
  }
  if (!state.members.length) {
    app.innerHTML = `<div class="empty-state"><div class="icon">🎻</div><p>Füge zuerst Mitglieder unter <strong>Besetzung</strong> hinzu</p></div>`;
    return;
  }
  const sorted = [...state.members].sort((a, b) => rolePriority(a) - rolePriority(b) || a.code - b.code);
  let h = `<div class="section-title">Wer spielt diese Woche?</div><div class="badge-grid">`;

      <button class="btn btn-outline btn-small" onclick="selectAll()">Alle</button>
      <button class="btn btn-outline btn-small" onclick="selectNone()">Keine</button>
    </div></div>`;
  h += `<div class="week-label-input"><input type="text" id="weekLabelInput" placeholder="Bezeichnung (z.B. KW 12 — Mahler 5)" value="${weekLabel}" oninput="setWeekLabel(this.value)"></div>`;

  // Fixed pairs UI
  const selArr = [...selected];
  if (selArr.length >= 2) {
    h += `<div style="margin-bottom:16px">`;
    h += `<div style="font-size:12px;color:var(--text-dim);margin-bottom:8px">Feste Paare (optional):</div>`;
    fixedPairs.forEach((fp, idx) => {
      const ma = state.members.find(m => m.id === fp.a);
      const mb = state.members.find(m => m.id === fp.b);
      if (ma && mb) {
        h += `<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;padding:6px 10px;background:var(--surface);border-radius:var(--radius);font-size:13px">

          ${fp.pult ? '<span class="text-dim">→ Pult ' + fp.pult + '</span>' : '<span class="text-dim">→ zufälliges Pult</span>'}

    });
    h += `<div style="display:flex;gap:6px;flex-wrap:wrap;align-items:center">
      <select id="fixA" style="font-size:12px;padding:6px"><option value="">Person A</option>`;
    selArr.forEach(id => {
      const m = state.members.find(m => m.id === id);
      if (m && !fixedPairs.some(fp => fp.a === id || fp.b === id)) h += `<option value="${id}">${m.name}</option>`;
    });
    h += `</select><select id="fixB" style="font-size:12px;padding:6px"><option value="">Person B</option>`;
    selArr.forEach(id => {
      const m = state.members.find(m => m.id === id);
      if (m && !fixedPairs.some(fp => fp.a === id || fp.b === id)) h += `<option value="${id}">${m.name}</option>`;
    });
    h += `</select>
      <input type="number" id="fixPult" placeholder="Pult (leer=zufall)" style="width:110px;font-size:12px;padding:6px" min="1">
      <button class="btn btn-outline btn-small" onclick="addFixedPair()">+ Paar fixieren</button>

  }

  h += `<button class="btn btn-gold" onclick="doGenerate()" ${selected.size < 2 ? 'disabled style="opacity:0.4;cursor:not-allowed"' : ''}>♪ Sitzordnung erstellen</button>`;
  if (currentSeating) {
    h += renderAtriles(currentSeating, true);
    h += `<div style="margin-top:12px"><textarea id="weekNotes" placeholder="Anmerkungen (optional)..." style="width:100%;font-family:'DM Sans',sans-serif;font-size:13px;padding:10px 14px;border:1px solid var(--border);border-radius:var(--radius);background:var(--surface);color:var(--text);resize:vertical;min-height:50px;outline:none" oninput="setWeekNotes(this.value)">${weekNotes||''}</textarea></div>`;
    h += `<div class="mt12 gap8">
      <button class="btn btn-gold" onclick="doGenerate()">↻ Neu erstellen</button>

      <button class="btn btn-outline" onclick="exportImage()">📷 Als Bild</button>
      <button class="btn btn-outline" onclick="window.print()">⎙ Drucken</button></div>`;
  }
  app.innerHTML = h;
}

window.toggleSelect = function(id) { selected.has(id) ? selected.delete(id) : selected.add(id); currentSeating = null; fixedPairs = fixedPairs.filter(fp => selected.has(fp.a) && selected.has(fp.b)); render(); };
window.selectAll = function() { state.members.forEach(m => selected.add(m.id)); currentSeating = null; render(); };
window.selectNone = function() { selected.clear(); currentSeating = null; fixedPairs = []; render(); };
window.setWeekLabel = function(v) { weekLabel = v; };
window.setWeekNotes = function(v) { weekNotes = v; };
window.doGenerate = function() {
  if (selected.size < 2) return;
  // Run algorithm multiple times, pick best result (most Wunschpartner matches)
  const TRIES = 10;
  let bestSeating = null, bestScore = -1;
  for (let t = 0; t < TRIES; t++) {
    const candidate = generateSeating([...selected]);
    // Score: count how many Wunschpartner pairs were satisfied
    let score = 0;
    candidate.forEach(pult => {
      if (pult.length >= 2) {
        for (let i = 0; i < pult.length; i++) {
          for (let j = i + 1; j < pult.length; j++) {
            const wb = wunschBonus(pult[i].id, pult[j].id);
            if (wb === 2) score += 3;      // mutual: high value
            else if (wb === 1) score += 1;  // one-way: some value
          }
        }
      }
    });
    if (score > bestScore) { bestScore = score; bestSeating = candidate; }
  }
  currentSeating = bestSeating;
  render();
};

window.addFixedPair = function() {
  const a = parseInt(document.getElementById('fixA').value);
  const b = parseInt(document.getElementById('fixB').value);
  const pult = parseInt(document.getElementById('fixPult').value) || 0;
  if (!a || !b || a === b) return;
  if (fixedPairs.some(fp => (fp.a === a && fp.b === b) || (fp.a === b && fp.b === a))) return;
  fixedPairs.push({ a, b, pult });
  currentSeating = null;
  render();
};
window.removeFixedPair = function(idx) {
  fixedPairs.splice(idx, 1);
  currentSeating = null;
  render();
};

window.saveWeek = function() {
  if (!currentSeating) return;
  state.history.push({
    id: Date.now(), date: new Date().toISOString(),
    label: weekLabel || `Woche ${state.history.length + 1}`,
    notes: weekNotes || '',
    atriles: currentSeating, memberIds: [...selected],
  });
  saveState(); currentSeating = null; weekLabel = ''; weekNotes = ''; selected.clear(); fixedPairs = []; switchView('history');
};

window.addMember = function() {
  const code = parseInt(document.getElementById('newCode').value);
  const name = document.getElementById('newName').value.trim();
  const role = document.getElementById('newRole').value;
  const pultMin = parseInt(document.getElementById('newPultMin').value) || 0;
  const pultMax = parseInt(document.getElementById('newPultMax').value) || 0;
  if (!name || isNaN(code) || code < 1) return;
  if (state.members.some(m => m.code === code)) { alert('Diese Nummer ist bereits vergeben'); return; }
  state.members.push({ id: state.nextId++, code, name, role, pultMin, pultMax, wunsch: [] });
  saveState(); render();
};
window.startEditMember = function(id) { editingId = id; render(); };
window.cancelEdit = function() { editingId = null; render(); };
window.saveEditMember = function(id) {
  const code = parseInt(document.getElementById('editCode').value);
  const name = document.getElementById('editName').value.trim();
  const role = document.getElementById('editRole').value;
  const pultMin = parseInt(document.getElementById('editPultMin').value) || 0;
  const pultMax = parseInt(document.getElementById('editPultMax').value) || 0;
  if (!name || isNaN(code) || code < 1) return;
  if (state.members.some(m => m.code === code && m.id !== id)) { alert('Diese Nummer ist bereits vergeben'); return; }
  const m = state.members.find(m => m.id === id);
  if (m) { m.code = code; m.name = name; m.role = role; m.pultMin = pultMin; m.pultMax = pultMax; if (!m.wunsch) m.wunsch = []; }
  editingId = null; saveState(); render();
};
window.deleteMember = function(id) {
  const m = state.members.find(m => m.id === id);
  if (!confirm(`${m.name} wirklich entfernen?`)) return;
  state.members = state.members.filter(m => m.id !== id);
  selected.delete(id); saveState(); render();
};

// ─── Rules View (Wunschpartner + Incompatibilities) ───
function renderRules() {
  let h = '';

  // ─── Wunschpartner ───
  h += `<div class="section-title">Wunschpartner</div>`;
  h += `<p class="text-dim mb12">Jedes Mitglied kann bis zu 4 bevorzugte Partner wählen. Gegenseitige Wünsche (♥♥) werden stärker berücksichtigt als einseitige (♥).</p>`;
  const sorted = [...state.members].sort((a, b) => a.code - b.code);
  if (!sorted.length) {
    h += `<div class="empty-state"><p>Füge zuerst Mitglieder unter Besetzung hinzu</p></div>`;
  } else {
    h += `<div class="member-list">`;
    sorted.forEach(m => {
      const wunsch = m.wunsch || [];
      const wNames = wunsch.map(id => state.members.find(x => x.id === id)).filter(Boolean).map(x => x.name);
      h += `<div class="member-row" style="flex-wrap:wrap">
        <div class="member-code ${ROLE_CSS[m.role] || ''}">${m.code}</div>
        <div class="member-name" style="min-width:100px">${m.name}</div>
        <div style="display:flex;gap:4px;align-items:center;flex:1;flex-wrap:wrap">`;
      if (wNames.length) {
        wunsch.forEach(id => {
          const partner = state.members.find(x => x.id === id);
          if (!partner) return;
          const mutual = partner.wunsch && partner.wunsch.includes(m.id);
          h += `<span style="font-size:11px;padding:3px 8px;border-radius:10px;background:${mutual ? 'rgba(201,169,110,0.25)' : 'rgba(201,169,110,0.1)'};color:var(--gold)">${mutual ? '♥♥' : '♥'} ${partner.name}</span>`;
        });
      } else {
        h += `<span class="text-dim" style="font-size:11px">keine</span>`;
      }
      h += `</div>
        <button class="btn btn-outline btn-small" onclick="editWunsch(${m.id})">✎</button>
      </div>`;
    });
    h += `</div>`;
  }

  // ─── Incompatibilities ───
  h += `<div class="section-title mt20">Unverträglichkeiten</div>`;
  h += `<p class="text-dim mb12">Diese Paare werden niemals am selben Pult sitzen.</p>`;
  const incompat = state.incompatible || [];
  if (incompat.length) {
    incompat.forEach((pair, idx) => {
      const a = state.members.find(m => m.id === pair[0]);
      const b = state.members.find(m => m.id === pair[1]);
      if (a && b) {
        h += `<div style="display:flex;align-items:center;gap:10px;padding:8px 12px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:6px">
          <span style="font-size:13px">${a.name} ✕ ${b.name}</span>
          <button class="btn btn-danger btn-small" style="margin-left:auto" onclick="removeIncompat(${idx})">Entfernen</button>
        </div>`;
      }
    });
  } else {
    h += `<p class="text-dim" style="margin-bottom:12px">Keine Unverträglichkeiten definiert.</p>`;
  }
  h += `<div style="display:flex;gap:6px;flex-wrap:wrap;align-items:center;margin-top:8px">
    <select id="incompA" style="font-size:12px;padding:6px"><option value="">Person A</option>`;
  sorted.forEach(m => { h += `<option value="${m.id}">${m.code} — ${m.name}</option>`; });
  h += `</select><select id="incompB" style="font-size:12px;padding:6px"><option value="">Person B</option>`;
  sorted.forEach(m => { h += `<option value="${m.id}">${m.code} — ${m.name}</option>`; });
  h += `</select>
    <button class="btn btn-danger btn-small" onclick="addIncompat()">+ Unverträglichkeit</button>
  </div>`;

  app.innerHTML = h;
}

// Wunschpartner edit modal (inline)
window.editWunsch = function(memberId) {
  const m = state.members.find(x => x.id === memberId);
  if (!m) return;
  const current = m.wunsch || [];
  const others = state.members.filter(x => x.id !== memberId).sort((a, b) => a.code - b.code);

  let options = '';
  others.forEach(o => {
    const checked = current.includes(o.id) ? 'checked' : '';
    options += `<label style="display:flex;align-items:center;gap:6px;padding:4px 0;font-size:13px;cursor:pointer"><input type="checkbox" value="${o.id}" ${checked} class="wunschCb" style="accent-color:var(--gold)"> ${o.code} — ${o.name}</label>`;
  });

  app.innerHTML = `
    <div class="section-title">Wunschpartner für ${m.name}</div>
    <p class="text-dim mb12">Maximal 4 auswählen.</p>
    <div style="display:flex;flex-direction:column;gap:2px;margin-bottom:16px">${options}</div>
    <div class="gap8">
      <button class="btn btn-gold" onclick="saveWunsch(${memberId})">Speichern</button>
      <button class="btn btn-outline" onclick="switchView('rules')">Abbrechen</button>
    </div>`;
};

window.saveWunsch = function(memberId) {
  const checks = document.querySelectorAll('.wunschCb:checked');
  const ids = [...checks].map(c => parseInt(c.value)).slice(0, 4); // max 4
  const m = state.members.find(x => x.id === memberId);
  if (m) { m.wunsch = ids; saveState(); }
  switchView('rules');
};

window.addIncompat = function() {
  const a = parseInt(document.getElementById('incompA').value);
  const b = parseInt(document.getElementById('incompB').value);
  if (!a || !b || a === b) return;
  if (!state.incompatible) state.incompatible = [];
  if (state.incompatible.some(p => (p[0]===a && p[1]===b) || (p[0]===b && p[1]===a))) return;
  state.incompatible.push([a, b]);
  saveState(); render();
};

window.removeIncompat = function(idx) {
  if (!state.incompatible) return;
  state.incompatible.splice(idx, 1);
  saveState(); render();
};

      }
      h += `</div>`;
    }
    h += `</div>`;
  });
  if (isAdmin) h += `<div class="mt20"><button class="btn btn-danger btn-small" onclick="clearHistory()">Gesamten Verlauf löschen</button></div>`;
  app.innerHTML = h;
}

window.toggleWeek = function(id) { expandedWeeks.has(id) ? expandedWeeks.delete(id) : expandedWeeks.add(id); render(); };
window.startEditWeek = function(id) { editingWeekId = id; render(); };
window.stopEditWeek = function() { editingWeekId = null; render(); };

window.saveWeekLabel = function(weekId) {
  const w = state.history.find(w => w.id === weekId);
  const input = document.getElementById(`editWeekLabel_${weekId}`);
  const notesEl = document.getElementById(`editWeekNotes_${weekId}`);
  if (w && input && input.value.trim()) {
    w.label = input.value.trim();
    if (notesEl) w.notes = notesEl.value || '';
    saveState(); render();
  }
};

window.removeFromPult = function(weekId, pultIdx, memberIdx) {
  const w = state.history.find(w => w.id === weekId);
  if (!w) return;
  const pult = w.atriles[pultIdx];
  if (!pult || pult.length <= 1) {
    if (confirm('Letzter Musiker am Pult. Gesamtes Pult entfernen?')) {
      w.atriles.splice(pultIdx, 1);
      w.memberIds = [...new Set(w.atriles.flat().map(p => p.id))];
      saveState(); render();
    }
    return;
  }
  pult.splice(memberIdx, 1);
  w.memberIds = [...new Set(w.atriles.flat().map(p => p.id))];
  saveState(); render();
};

window.addToPult = function(weekId, pultIdx) {
  const select = document.getElementById(`addToPult_${weekId}_${pultIdx}`);
  if (!select || !select.value) return;
  const memberId = parseInt(select.value);
  const member = state.members.find(m => m.id === memberId);
  if (!member) return;
  const w = state.history.find(w => w.id === weekId);
  if (!w) return;
  w.atriles[pultIdx].push(serialize(member));
  if (!w.memberIds) w.memberIds = [];
  if (!w.memberIds.includes(memberId)) w.memberIds.push(memberId);
  saveState(); render();
};

window.deleteWeek = function(id) {
  if (!confirm('Diese Woche wirklich löschen?')) return;
  state.history = state.history.filter(w => w.id !== id);
  if (editingWeekId === id) editingWeekId = null;
  saveState(); render();
};
window.clearHistory = function() {
  if (!confirm('Den gesamten Verlauf löschen? Dies kann nicht rückgängig gemacht werden.')) return;
  state.history = []; editingWeekId = null; saveState(); render();
};

// ─── Stats View ───
function renderStats() {
  let h = `<div class="section-title">Paarungsstatistik</div>`;
  if (!state.history.length) {
    h += `<div class="empty-state"><div class="icon">📊</div><p>Speichere einige Wochen, um Statistiken zu sehen</p></div>`;
    app.innerHTML = h; return;
  }

  // ─── Partner search: "Wann habe ich mit X gespielt?" ───
  h += `<div style="margin-bottom:20px;padding:14px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius)">
    <div style="font-size:13px;color:var(--text-mid);margin-bottom:8px">🔍 Wann habe ich mit jemandem gespielt?</div>
    <div style="display:flex;gap:8px;flex-wrap:wrap">
      <select id="searchA" style="flex:1;min-width:120px;font-size:13px;padding:8px" onchange="searchPartner()">
        <option value="">Person A wählen...</option>`;
  state.members.sort((a,b) => a.code - b.code).forEach(m => {
    h += `<option value="${m.id}">${m.name}</option>`;
  });
  h += `</select>
      <select id="searchB" style="flex:1;min-width:120px;font-size:13px;padding:8px" onchange="searchPartner()">
        <option value="">Person B wählen...</option>`;
  state.members.sort((a,b) => a.code - b.code).forEach(m => {
    h += `<option value="${m.id}">${m.name}</option>`;
  });
  h += `</select></div><div id="searchResults" style="margin-top:10px"></div></div>`;

  // ─── Pair stats ───
  const pairings = {};
  state.history.forEach(w => w.atriles.forEach(a => {
    for (let i = 0; i < a.length; i++)
      for (let j = i+1; j < a.length; j++) {
        const k = pairKey(a[i].id, a[j].id);
        if (!pairings[k]) pairings[k] = { count: 0, names: [a[i].name, a[j].name] };
        pairings[k].count++;
      }
  }));
  const ps = Object.values(pairings).sort((a, b) => b.count - a.count);
  if (!ps.length) { h += `<div class="empty-state"><p>Noch keine Paarungsdaten</p></div>`; }
  else {
    h += `<p class="text-dim mb12">${state.history.length} Wochen erfasst · ${ps.length} verschiedene Paarungen</p>
      <table class="stats-table"><thead><tr><th>Paarung</th><th>Zusammen</th><th>Häufigkeit</th></tr></thead><tbody>`;
    ps.forEach(p => {
      const pct = Math.round((p.count / state.history.length) * 100);
      h += `<tr><td>${p.names[0]} + ${p.names[1]}</td>
        <td style="font-family:'DM Mono',monospace">${p.count}×</td>
        <td><div style="width:${Math.min(pct * 2, 100)}px;height:6px;border-radius:3px;background:var(--gold);opacity:${Math.min(0.3 + pct/100, 1)};display:inline-block;vertical-align:middle"></div>
        <span class="text-dim" style="margin-left:6px">${pct}%</span></td></tr>`;
    });
    h += `</tbody></table>`;
  }
  h += `<div class="section-title mt20">Einsätze</div>`;
  const pc = {};
  state.history.forEach(w => w.atriles.flat().forEach(p => {
    if (!pc[p.id]) pc[p.id] = { name: p.name, code: p.code, role: p.role || 'tutti', count: 0 };
    pc[p.id].count++;
  }));
  const pcs = Object.values(pc).sort((a, b) => b.count - a.count);
  h += `<table class="stats-table"><thead><tr><th>Musiker</th><th>Rolle</th><th>Wochen</th><th></th></tr></thead><tbody>`;
  pcs.forEach(p => {
    const pct = Math.round((p.count / state.history.length) * 100);
    const rc = ROLE_CSS[p.role] || '';
    h += `<tr><td><span style="font-family:'DM Mono',monospace;font-size:11px;opacity:0.5;margin-right:6px">${p.code}</span>${p.name}</td>
      <td><span class="role-tag ${rc}" style="margin:0">${ROLE_LABELS[p.role] || 'Tutti'}</span></td>
      <td style="font-family:'DM Mono',monospace">${p.count}/${state.history.length}</td>
      <td><div style="width:${Math.min(pct, 100)}px;height:6px;border-radius:3px;background:var(--accent);display:inline-block;vertical-align:middle"></div>
      <span class="text-dim" style="margin-left:6px">${pct}%</span></td></tr>`;
  });
  h += `</tbody></table>`;
  app.innerHTML = h;
}

// ─── Partner Search ───
window.searchPartner = function() {
  const aId = parseInt(document.getElementById('searchA').value);
  const bId = parseInt(document.getElementById('searchB').value);
  const div = document.getElementById('searchResults');
  if (!div) return;
  if (!aId && !bId) { div.innerHTML = ''; return; }

  // If only one selected: show all partners
  if (aId && !bId || !aId && bId) {
    const targetId = aId || bId;
    const target = state.members.find(m => m.id === targetId);
    if (!target) return;
    const partnerCounts = {};
    const partnerWeeks = {};
    state.history.forEach(w => {
      w.atriles.forEach(a => {
        const inPult = a.find(p => p.id === targetId);
        if (inPult) {
          a.forEach(p => {
            if (p.id !== targetId) {
              partnerCounts[p.name] = (partnerCounts[p.name] || 0) + 1;
              if (!partnerWeeks[p.name]) partnerWeeks[p.name] = [];
              partnerWeeks[p.name].push(w.label);
            }
          });
        }
      });
    });
    const sorted = Object.entries(partnerCounts).sort((a,b) => b[1] - a[1]);
    let html = `<div style="font-size:13px;color:var(--text)"><strong>${target.name}</strong> hat gespielt mit:</div>`;
    html += `<table class="stats-table" style="margin-top:8px"><thead><tr><th>Partner</th><th>Mal</th><th>Wann</th></tr></thead><tbody>`;
    sorted.forEach(([name, count]) => {
      const weeks = partnerWeeks[name].join(', ');
      html += `<tr><td>${name}</td><td style="font-family:'DM Mono',monospace">${count}×</td><td class="text-dim" style="font-size:11px">${weeks}</td></tr>`;
    });
    html += `</tbody></table>`;
    div.innerHTML = html;
    return;
  }

  // Both selected: show when they played together
  const a = state.members.find(m => m.id === aId);
  const b = state.members.find(m => m.id === bId);
  if (!a || !b) return;
  const together = [];
  state.history.forEach(w => {
    w.atriles.forEach((atril, pi) => {
      const hasA = atril.some(p => p.id === aId);
      const hasB = atril.some(p => p.id === bId);
      if (hasA && hasB) {
        const d = new Date(w.date).toLocaleDateString('de-DE', { day: 'numeric', month: 'short' });
        together.push({ label: w.label, date: d, pult: pi + 1 });
      }
    });
  });

  let html = '';
  if (together.length === 0) {
    html = `<div style="font-size:13px;color:var(--text-dim)">${a.name} und ${b.name} haben noch nie zusammen am Pult gesessen.</div>`;
  } else {
    html = `<div style="font-size:13px;color:var(--text)"><strong>${a.name}</strong> und <strong>${b.name}</strong>: ${together.length}× zusammen</div>`;
    html += `<div style="margin-top:6px;display:flex;flex-wrap:wrap;gap:6px">`;
    together.forEach(t => {
      html += `<span style="font-size:11px;padding:4px 10px;border-radius:12px;background:var(--surface2);color:var(--text-mid)">${t.label} (${t.date}, Pult ${t.pult})</span>`;
    });
    html += `</div>`;
  }
  div.innerHTML = html;
};

// ─── Image Export ───
let h2cLoaded = false;
function loadH2C() {
  return new Promise((resolve, reject) => {
    if (h2cLoaded) { resolve(); return; }
    const s = document.createElement('script');
    s.src = 'https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js';
    s.onload = () => { h2cLoaded = true; resolve(); };
    s.onerror = () => { reject(new Error('html2canvas konnte nicht geladen werden')); };
    document.head.appendChild(s);
  });
}

function buildExportDiv(title, atriles, notes) {
  // Build a self-contained div with inline styles (no CSS variables)
  const bg = '#0e0e14'; const gold = '#c9a96e'; const surface = '#16161f';
  const border = '#2a2a3a'; const text = '#e8e4dc'; const textDim = '#7a7680';
  const frontBg = '#1a1a2e'; const clrSf = '#c9a96e'; const clrSv = '#7a9fb5';
  const clrVs = '#9a7ab5'; const clrAk = '#6ab58a'; const clrSu = '#b57a7a';
  const roleColors = { stimmfuehrer: clrSf, stellvertreter: clrSv, vorspieler: clrVs, akademist: clrAk, substitut: clrSu };

  let html = `<div style="padding:24px 20px;background:${bg};font-family:'DM Sans',Helvetica,Arial,sans-serif;width:600px">`;
  // Title
  html += `<div style="font-family:'Cormorant Garamond',Georgia,serif;font-size:22px;color:${gold};text-align:center;margin-bottom:4px">${title}</div>`;
  html += `<div style="font-family:'DM Mono',monospace;font-size:10px;color:${textDim};text-align:center;letter-spacing:2px;margin-bottom:20px">ZWEITE VIOLINEN</div>`;
  // Atriles
  atriles.forEach((a, i) => {
    const hasFront = a.some(p => ['stimmfuehrer','stellvertreter','vorspieler'].includes(p.role));
    const cardBg = hasFront ? frontBg : surface;
    const cardBorder = hasFront ? gold : border;
    const numBg = hasFront ? gold : '#1e1e2a';
    const numColor = hasFront ? bg : textDim;
    html += `<div style="display:flex;align-items:center;gap:14px;padding:12px 16px;border-radius:8px;background:${cardBg};border:1px solid ${cardBorder};margin-bottom:8px">`;
    html += `<div style="font-family:'DM Mono',monospace;font-size:14px;font-weight:700;width:32px;height:32px;border-radius:8px;background:${numBg};color:${numColor};display:flex;align-items:center;justify-content:center;flex-shrink:0">${i+1}</div>`;
    html += `<div style="display:flex;gap:8px;flex:1;flex-wrap:wrap">`;
    a.forEach(p => {
      const role = p.role || 'tutti';
      const roleColor = roleColors[role];
      html += `<div style="display:flex;align-items:center;gap:6px;padding:4px 12px;border-radius:14px;font-size:13px;background:rgba(255,255,255,0.04);color:${text}">`;
      html += `<span style="font-family:'DM Mono',monospace;font-size:10px;opacity:0.5">${p.code}</span>`;
      html += `${p.name}`;
      if (role !== 'tutti' && roleColor) {
        html += ` <span style="font-size:9px;font-family:'DM Mono',monospace;color:${roleColor}">${ROLE_LABELS[role]}</span>`;
      }
      html += `</div>`;
    });
    html += `</div>`;
    html += `<div style="font-family:'DM Mono',monospace;font-size:9px;text-transform:uppercase;letter-spacing:1.5px;color:${textDim};writing-mode:vertical-rl;opacity:0.4;flex-shrink:0">Pult</div>`;
    html += `</div>`;
  });
  // Notes
  if (notes) {
    html += `<div style="margin-top:8px;padding:8px 12px;background:#1e1e2a;border-radius:8px;font-size:12px;color:${textDim};white-space:pre-wrap">📝 ${notes}</div>`;
  }
  html += `</div>`;
  return html;
}

async function exportAsImage(title, atriles, notes, filename) {
  try {
    await loadH2C();
  } catch(e) {
    alert(e.message);
    return;
  }
  // Create offscreen container
  const container = document.createElement('div');
  container.style.cssText = 'position:fixed;left:-9999px;top:0;z-index:-1';
  container.innerHTML = buildExportDiv(title, atriles, notes);
  document.body.appendChild(container);
  const target = container.firstChild;

  try {
    // Wait a tick for fonts/layout
    await new Promise(r => setTimeout(r, 100));
    const canvas = await html2canvas(target, {
      backgroundColor: '#0e0e14',
      scale: 2,
      logging: false,
      width: target.scrollWidth,
      height: target.scrollHeight,
      windowWidth: target.scrollWidth,
      windowHeight: target.scrollHeight,
    });
    document.body.removeChild(container);

    canvas.toBlob(blob => {
      if (!blob) { alert('Bild konnte nicht erstellt werden'); return; }
      const file = new File([blob], filename, { type: 'image/png' });
      // Try native share (mobile)
      if (navigator.share && navigator.canShare) {
        try {
          if (navigator.canShare({ files: [file] })) {
            navigator.share({ files: [file], title: 'Sitzordnung' }).catch(() => {
              downloadBlob(blob, filename);
            });
            return;
          }
        } catch(e) {}
      }
      downloadBlob(blob, filename);
    }, 'image/png');
  } catch(e) {
    document.body.removeChild(container);
    alert('Fehler: ' + e.message);
  }
}

function downloadBlob(blob, filename) {
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename;
  a.click();
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}

window.exportImage = function() {
  if (!currentSeating) return;
  const title = (weekLabel || 'Sitzordnung') + ' — ' + new Date().toLocaleDateString('de-DE');
  exportAsImage(title, currentSeating, weekNotes, `sitzordnung-${new Date().toISOString().slice(0,10)}.png`);
};

window.exportWeekImage = function(weekId) {
  const w = state.history.find(w => w.id === weekId);
  if (!w) return;
  const title = w.label + ' — ' + new Date(w.date).toLocaleDateString('de-DE');
  exportAsImage(title, w.atriles, w.notes, `sitzordnung-${w.label.replace(/[^a-zA-Z0-9]/g,'_')}.png`);
};

// ─── Export / Import ───
window.exportData = function() {
  const b = new Blob([JSON.stringify(state, null, 2)], { type: 'application/json' });
  const u = URL.createObjectURL(b);
  const a = document.createElement('a'); a.href = u;
  a.download = `sitzordnung-backup-${new Date().toISOString().slice(0,10)}.json`;
  a.click(); URL.revokeObjectURL(u);
};
window.importData = function(e) {
  const f = e.target.files[0]; if (!f) return;
  const r = new FileReader();
  r.onload = (ev) => {
    try {
      const d = JSON.parse(ev.target.result);
      if (d.members && d.history) {
        if (confirm(`${d.members.length} Mitglieder und ${d.history.length} Wochen importieren? Dies ersetzt die aktuellen Daten.`)) {
          state = d; saveState(); render();
        }
      } else alert('Ungültiges Dateiformat');
    } catch { alert('Fehler beim Lesen der Datei'); }
  };
  r.readAsText(f); e.target.value = '';
};
